<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatuaże</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preload" href="DancingScript-Regular.woff2" as="font" type="font/woff2" crossorigin>
</head>
<body>
        <header id="one">
            <img src="logo.png" alt="salon">
            
        </header>
        <header id="two">
            <h1>Studio Tatuażu</h1>
        </header>
        <section>
            <h2>Galeria</h2>
            <img class="miniatury" src="smok.png" alt="smok.png">
            <img class="miniatury" src="koliber.png" alt="koliber.png">
        </section>
        <aside>
            <h3>Dodaj wzór</h3>
            <label for="wzor">Wzór:</label><br>
            <input type="file" id="wzor" name="wzor" accept=".png"><br><br>

            <label for="kolor">Kolor:</label><br>
            <select id="kolor" name="kolor">
                <option>Czarny</option>
                <option>Czerwony</option>
                <option>Zielony</option>
                <option>Niebieski</option>
            </select><br><br>

            <label for="cena">Cena:</label><br>
            <input type="number" id="cena" name="cena"><br><br>
        </aside>
        <footer></footer>
</body>
</html>
